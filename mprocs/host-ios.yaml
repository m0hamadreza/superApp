procs:
  Host:
    shell: pnpm --filter host start --platform ios
    stop: SIGKILL
  # Each remote runs as a DEV SERVER (HMR) only when named in DEV; otherwise it is
  # served as a prebuilt STATIC bundle. The iOS simulator reaches localhost directly,
  # so no adb reverse is needed.
  #   <config> with no DEV  -> both static    DEV=booking -> booking dev, news static
  #   DEV=news -> news dev   DEV=both -> both dev servers
  Booking:
    shell: 'if [ "$DEV" = both ] || echo "$DEV" | grep -qw booking; then cd ../booking && npm start -- --platform ios; else python3 -m http.server 9000 --directory ../booking/build/generated; fi'
    stop: SIGKILL
  News:
    shell: 'if [ "$DEV" = both ] || echo "$DEV" | grep -qw news; then cd ../news && pnpm start --platform ios; else python3 -m http.server 9004 --directory ../news/build/generated; fi'
    stop: SIGKILL
