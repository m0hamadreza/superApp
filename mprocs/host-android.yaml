procs:
  Host:
    shell: pnpm --filter host start --platform android
    stop: SIGKILL
  # Each remote runs as a DEV SERVER (HMR) only when named in DEV; otherwise it is
  # served as a prebuilt STATIC bundle (+ adb reverse for the Android emulator).
  #   <config> with no DEV        -> both static (pure view-only)
  #   DEV=booking ...             -> booking dev server, news static + reverse
  #   DEV=news ...                -> news dev server, booking static + reverse
  #   DEV=both ...                -> both dev servers
  Booking:
    shell: 'if [ "$DEV" = both ] || echo "$DEV" | grep -qw booking; then cd ../booking && npm start -- --platform android; else adb reverse tcp:9000 tcp:9000 || true; python3 -m http.server 9000 --directory ../booking/build/generated; fi'
    stop: SIGKILL
  News:
    shell: 'if [ "$DEV" = both ] || echo "$DEV" | grep -qw news; then cd ../news-mini-app-showcase && pnpm start --platform android; else adb reverse tcp:9004 tcp:9004 || true; python3 -m http.server 9004 --directory ../news-mini-app-showcase/build/generated; fi'
    stop: SIGKILL
